version: '3.8'

services:
  webmonitor:
    image: yunlianw/webmonitor:latest
    container_name: webmonitor
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=webmonitor
      - DB_USERNAME=webmonitor
      - DB_PASSWORD=WebMonitor2026!
      - TZ=Asia/Shanghai
    volumes:
      - ./storage:/var/www/html/storage
      - ./logs:/var/www/html/logs
      - ./backups:/var/www/html/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webmonitor-net

  db:
    image: mysql:8.0
    container_name: webmonitor-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=RootPassword2026!
      - MYSQL_DATABASE=webmonitor
      - MYSQL_USER=webmonitor
      - MYSQL_PASSWORD=WebMonitor2026!
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webmonitor-net

networks:
  webmonitor-net:
    driver: bridge

volumes:
  mysql-data: